<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 500;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #6c757d;
        }
        .btn-danger {
            background: #dc3545;
        }
        .novel-list {
            display: grid;
            gap: 12px;
        }
        .novel-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .novel-item:hover {
            background: #e9ecef;
        }
        .novel-item.active {
            background: #e7f3ff;
            border: 2px solid #667eea;
        }
        .chapter-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }
        .chapter-item {
            padding: 12px;
            background: #f8f9fa;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chapter-item:hover {
            background: #e7f3ff;
        }
        .editor {
            width: 100%;
            min-height: 400px;
            padding: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.8;
            resize: vertical;
        }
        .status {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
        }
        .status.pending {
            background: #fff3cd;
            color: #856404;
        }
        .status.running {
            background: #cce5ff;
            color: #004085;
        }
        .status.completed {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .hidden {
            display: none;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>小说生成器</h1>
            <p>AI 辅助小说创作工具</p>
        </div>

        <div class="card" id="config-section">
            <h2>API 配置</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>LLM 接口类型</label>
                    <select id="llm-type">
                        <option value="deepseek">DeepSeek</option>
                        <option value="openai">OpenAI</option>
                        <option value="ollama">Ollama</option>
                        <option value="硅基流动">硅基流动</option>
                        <option value="火山引擎">火山引擎</option>
                        <option value="grok">Grok</option>
                        <option value="gemini">Gemini</option>
                        <option value="azure openai">Azure OpenAI</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>API Key</label>
                    <input type="password" id="api-key" placeholder="请输入 API Key">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Base URL</label>
                    <input type="text" id="base-url" placeholder="https://api.deepseek.com/v1">
                </div>
                <div class="form-group">
                    <label>模型名称</label>
                    <input type="text" id="model-name" placeholder="deepseek-chat">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Temperature</label>
                    <input type="number" id="temperature" value="0.7" step="0.1" min="0" max="2">
                </div>
                <div class="form-group">
                    <label>Max Tokens</label>
                    <input type="number" id="max-tokens" value="4096">
                </div>
                <div class="form-group">
                    <label>超时时间(秒)</label>
                    <input type="number" id="timeout" value="300">
                </div>
            </div>

            <h3 style="margin: 20px 0 10px; color: #555;">Embedding 配置</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Embedding 接口</label>
                    <select id="embedding-type">
                        <option value="openai">OpenAI</option>
                        <option value="ollama">Ollama</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Embedding API Key</label>
                    <input type="password" id="embedding-key" placeholder="请输入 API Key">
                </div>
                <div class="form-group">
                    <label>Embedding URL</label>
                    <input type="text" id="embedding-url" placeholder="https://api.openai.com/v1">
                </div>
                <div class="form-group">
                    <label>Embedding 模型</label>
                    <input type="text" id="embedding-model" value="text-embedding-3-small">
                </div>
            </div>
            <button class="btn" onclick="saveConfig()">保存配置</button>
        </div>

        <div class="card">
            <h2>小说管理</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>新建小说</label>
                    <input type="text" id="new-novel-name" placeholder="输入小说名称">
                </div>
                <div class="form-group" style="display: flex; align-items: flex-end;">
                    <button class="btn" onclick="createNovel()">创建</button>
                </div>
            </div>
            <h3 style="margin: 20px 0 10px; color: #555;">已有小说</h3>
            <div id="novel-list" class="novel-list"></div>
        </div>

        <div class="card hidden" id="novel-workspace">
            <h2>章节编辑</h2>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('generate')">生成章节</button>
                <button class="tab" onclick="switchTab('edit')">编辑章节</button>
            </div>

            <div id="generate-tab">
                <div class="form-row">
                    <div class="form-group">
                        <label>章节编号</label>
                        <input type="number" id="gen-chapter-num" value="1" min="1">
                    </div>
                    <div class="form-group">
                        <label>目标字数</label>
                        <input type="number" id="gen-word-num" value="3000">
                    </div>
                </div>
                <button class="btn" onclick="generateChapter()">生成章节</button>
                <div id="generate-status" class="status hidden"></div>
            </div>

            <div id="edit-tab" class="hidden">
                <div class="form-group">
                    <label>选择章节</label>
                    <div id="chapter-list" class="chapter-list"></div>
                </div>
                <div id="chapter-editor" class="hidden">
                    <div class="form-group">
                        <label>章节内容</label>
                        <textarea id="chapter-content" class="editor"></textarea>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn" onclick="saveChapter()">保存</button>
                        <button class="btn" onclick="finalizeChapter()">定稿</button>
                    </div>
                </div>
                <div id="finalize-status" class="status hidden"></div>
            </div>
        </div>
    </div>

    <script>
        let currentNovel = null;
        let currentChapter = null;

        async function saveConfig() {
            const config = {
                llm_configs: {
                    default: {
                        interface_format: document.getElementById('llm-type').value,
                        api_key: document.getElementById('api-key').value,
                        base_url: document.getElementById('base-url').value,
                        model_name: document.getElementById('model-name').value,
                        temperature: parseFloat(document.getElementById('temperature').value),
                        max_tokens: parseInt(document.getElementById('max-tokens').value),
                        timeout: parseInt(document.getElementById('timeout').value)
                    }
                },
                embedding_config: {
                    interface_format: document.getElementById('embedding-type').value,
                    api_key: document.getElementById('embedding-key').value,
                    url: document.getElementById('embedding-url').value,
                    model_name: document.getElementById('embedding-model').value
                }
            };
            
            try {
                const res = await fetch('/api/config/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(config)
                });
                const data = await res.json();
                alert(data.message || '配置已保存');
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }

        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                if (res.ok) {
                    const config = await res.json();
                    if (config.llm_configs?.default) {
                        const llm = config.llm_configs.default;
                        document.getElementById('llm-type').value = llm.interface_format || 'deepseek';
                        document.getElementById('api-key').value = llm.api_key || '';
                        document.getElementById('base-url').value = llm.base_url || '';
                        document.getElementById('model-name').value = llm.model_name || '';
                        document.getElementById('temperature').value = llm.temperature || 0.7;
                        document.getElementById('max-tokens').value = llm.max_tokens || 4096;
                        document.getElementById('timeout').value = llm.timeout || 300;
                    }
                    if (config.embedding_config) {
                        const emb = config.embedding_config;
                        document.getElementById('embedding-type').value = emb.interface_format || 'openai';
                        document.getElementById('embedding-key').value = emb.api_key || '';
                        document.getElementById('embedding-url').value = emb.url || '';
                        document.getElementById('embedding-model').value = emb.model_name || 'text-embedding-3-small';
                    }
                }
            } catch (e) {
                console.log('加载默认配置');
            }
        }

        async function createNovel() {
            const name = document.getElementById('new-novel-name').value.trim();
            if (!name) {
                alert('请输入小说名称');
                return;
            }
            
            try {
                const res = await fetch('/api/novels', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({novel_name: name})
                });
                const data = await res.json();
                if (data.status === 'success') {
                    document.getElementById('new-novel-name').value = '';
                    loadNovels();
                } else {
                    alert(data.message || '创建失败');
                }
            } catch (e) {
                alert('创建失败: ' + e.message);
            }
        }

        async function loadNovels() {
            try {
                const res = await fetch('/api/novels');
                const data = await res.json();
                const container = document.getElementById('novel-list');
                
                if (data.novels.length === 0) {
                    container.innerHTML = '<p style="color: #999;">暂无小说</p>';
                    return;
                }
                
                container.innerHTML = data.novels.map(n => `
                    <div class="novel-item ${currentNovel === n.name ? 'active' : ''}" 
                         onclick="selectNovel('${n.name}')">
                        <span><strong>${n.name}</strong></span>
                        <span>${n.chapter_count} 章</span>
                    </div>
                `).join('');
            } catch (e) {
                console.error('加载小说列表失败:', e);
            }
        }

        function selectNovel(name) {
            currentNovel = name;
            loadNovels();
            document.getElementById('novel-workspace').classList.remove('hidden');
            loadChapters();
        }

        async function loadChapters() {
            if (!currentNovel) return;
            
            try {
                const res = await fetch(`/api/novels/${currentNovel}/chapters`);
                const data = await res.json();
                const container = document.getElementById('chapter-list');
                
                if (data.chapters.length === 0) {
                    container.innerHTML = '<p style="color: #999;">暂无章节</p>';
                    return;
                }
                
                container.innerHTML = data.chapters.map(c => `
                    <div class="chapter-item ${currentChapter === c.number ? 'active' : ''}"
                         onclick="selectChapter(${c.number})">
                        第${c.number}章<br>
                        <small>${c.word_count}字</small>
                    </div>
                `).join('');
            } catch (e) {
                console.error('加载章节失败:', e);
            }
        }

        async function selectChapter(num) {
            currentChapter = num;
            loadChapters();
            
            try {
                const res = await fetch(`/api/novels/${currentNovel}/chapters/${num}`);
                const data = await res.json();
                document.getElementById('chapter-content').value = data.content;
                document.getElementById('chapter-editor').classList.remove('hidden');
            } catch (e) {
                alert('加载章节失败: ' + e.message);
            }
        }

        async function saveChapter() {
            if (!currentNovel || !currentChapter) return;
            
            const content = document.getElementById('chapter-content').value;
            
            try {
                const res = await fetch(`/api/novels/${currentNovel}/chapters/${currentChapter}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content})
                });
                alert('保存成功');
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'generate') {
                document.getElementById('generate-tab').classList.remove('hidden');
                document.getElementById('edit-tab').classList.add('hidden');
            } else {
                document.getElementById('generate-tab').classList.add('hidden');
                document.getElementById('edit-tab').classList.remove('hidden');
            }
        }

        function getLLMConfig() {
            return {
                interface_format: document.getElementById('llm-type').value,
                api_key: document.getElementById('api-key').value,
                base_url: document.getElementById('base-url').value,
                model_name: document.getElementById('model-name').value,
                temperature: parseFloat(document.getElementById('temperature').value),
                max_tokens: parseInt(document.getElementById('max-tokens').value),
                timeout: parseInt(document.getElementById('timeout').value)
            };
        }

        function getEmbeddingConfig() {
            return {
                interface_format: document.getElementById('embedding-type').value,
                api_key: document.getElementById('embedding-key').value,
                url: document.getElementById('embedding-url').value,
                model_name: document.getElementById('embedding-model').value
            };
        }

        async function generateChapter() {
            if (!currentNovel) {
                alert('请先选择或创建小说');
                return;
            }
            
            const chapterNum = parseInt(document.getElementById('gen-chapter-num').value);
            const wordNum = parseInt(document.getElementById('gen-word-num').value);
            
            const statusDiv = document.getElementById('generate-status');
            statusDiv.classList.remove('hidden', 'pending', 'running', 'completed', 'error');
            statusDiv.classList.add('pending');
            statusDiv.textContent = '正在生成章节...';
            
            try {
                const res = await fetch('/api/generate/chapter', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        novel_name: currentNovel,
                        chapter_num: chapterNum,
                        word_number: wordNum,
                        llm_config: getLLMConfig(),
                        embedding_config: getEmbeddingConfig()
                    })
                });
                
                const data = await res.json();
                
                statusDiv.classList.remove('pending');
                statusDiv.classList.add('running');
                statusDiv.textContent = '生成中，请稍候...';
                
                pollTaskStatus(data.task_id, statusDiv);
            } catch (e) {
                statusDiv.classList.remove('pending', 'running');
                statusDiv.classList.add('error');
                statusDiv.textContent = '生成失败: ' + e.message;
            }
        }

        async function pollTaskStatus(taskId, statusDiv) {
            const check = async () => {
                try {
                    const res = await fetch(`/api/tasks/${taskId}`);
                    const data = await res.json();
                    
                    if (data.status === 'completed') {
                        statusDiv.classList.remove('running');
                        statusDiv.classList.add('completed');
                        statusDiv.textContent = '生成完成！';
                        loadChapters();
                    } else if (data.status === 'error') {
                        statusDiv.classList.remove('running');
                        statusDiv.classList.add('error');
                        statusDiv.textContent = '生成失败: ' + data.message;
                    } else {
                        setTimeout(check, 2000);
                    }
                } catch (e) {
                    setTimeout(check, 2000);
                }
            };
            setTimeout(check, 2000);
        }

        async function finalizeChapter() {
            if (!currentNovel || !currentChapter) {
                alert('请先选择章节');
                return;
            }
            
            const content = document.getElementById('chapter-content').value;
            
            const statusDiv = document.getElementById('finalize-status');
            statusDiv.classList.remove('hidden', 'pending', 'running', 'completed', 'error');
            statusDiv.classList.add('pending');
            statusDiv.textContent = '正在定稿...';
            
            try {
                const res = await fetch('/api/finalize/chapter', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        novel_name: currentNovel,
                        chapter_num: currentChapter,
                        chapter_content: content,
                        llm_config: getLLMConfig(),
                        embedding_config: getEmbeddingConfig()
                    })
                });
                
                const data = await res.json();
                
                statusDiv.classList.remove('pending');
                statusDiv.classList.add('running');
                statusDiv.textContent = '定稿中，请稍候...';
                
                pollTaskStatus(data.task_id, statusDiv);
            } catch (e) {
                statusDiv.classList.add('error');
                statusDiv.textContent = '定稿失败: ' + e.message;
            }
        }

        loadConfig();
        loadNovels();
    </script>
</body>
</html>
